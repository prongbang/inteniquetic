apiVersion: apps/v1
kind: Deployment
metadata:
  name: inteniquetic-deployment
  labels:
    app: inteniquetic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inteniquetic
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: inteniquetic
    spec:
      containers:
        - name: inteniquetic
          image: ghcr.io/prongbang/inteniquetic:master
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Asia/Bangkok
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      # imagePullSecrets:
      #   - name: dockerconfigjson-github-com
